name: Create release
description: >
  Create a single GitHub release for one repository. Re-resolves the branch HEAD
  at run time (so a release cut after a CE → EE sync points at the post-sync
  commit), ensures the tag does not already exist, builds merged CE+EE notes for
  EE bundles (or auto/custom notes otherwise), and creates the release.

inputs:
  owner:
    required: true
  repo:
    required: true
  base_branch:
    description: "Branch whose current HEAD is tagged (used only when 'sha' is empty)"
    required: true
  sha:
    description: >
      Exact commit to tag. When set, the release is cut from THIS commit instead
      of re-resolving base_branch — pass the single post-sync SHA that ExtJS
      validation checked, so the tagged commit cannot diverge from the validated
      one if the branch advances mid-run. When empty, base_branch HEAD is resolved
      at run time.
    default: ""
  ce_sha:
    description: >
      Exact CE commit to source merged notes from (EE bundles only). When empty
      and ce_repo is set, the CE base_branch HEAD is resolved at run time.
    default: ""
  tag_name:
    required: true
  release_name:
    required: true
  draft:
    description: '"true" or "false"'
    required: true
  prerelease:
    default: "false"
  auto_changelog:
    default: "true"
  changelog:
    default: ""
  ce_owner:
    default: ""
  ce_repo:
    default: ""
  release_token:
    required: true

runs:
  using: composite
  steps:
    - name: Resolve post-sync HEAD SHA
      shell: bash
      env:
        RELEASE_TOKEN: ${{ inputs.release_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        CE_OWNER: ${{ inputs.ce_owner }}
        CE_REPO: ${{ inputs.ce_repo }}
        INPUT_SHA: ${{ inputs.sha }}
        INPUT_CE_SHA: ${{ inputs.ce_sha }}
      run: |
        set -euo pipefail

        # Re-resolve HEAD here (not at prepare time) so an EE release cut after
        # the CE → EE sync merge points at the post-sync commit.
        resolve() {
          local o="$1" r="$2" b="$3" resp status sha
          resp=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/repos/${o}/${r}/commits/${b}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")
          status=$(echo "${resp}" | tail -n 1 | cut -d: -f2)
          if [[ "${status}" -ne 200 ]]; then
            echo "❌ Failed to resolve HEAD of ${o}/${r}@${b} (HTTP ${status})" >> "$GITHUB_STEP_SUMMARY"
            return 1
          fi
          sha=$(echo "${resp}" | sed '$d' | jq -r '.sha // ""')
          if [[ -z "${sha}" || "${sha}" == "null" ]]; then
            echo "❌ Empty SHA for ${o}/${r}@${b}" >> "$GITHUB_STEP_SUMMARY"
            return 1
          fi
          printf '%s' "${sha}"
        }

        # Prefer a caller-provided immutable SHA so the tagged commit is exactly
        # the one ExtJS validation checked; only resolve HEAD when none was passed.
        if [[ -n "${INPUT_SHA}" ]]; then
          LATEST_SHA="${INPUT_SHA}"
        else
          LATEST_SHA=$(resolve "${OWNER}" "${REPO}" "${BASE_BRANCH}")
        fi
        echo "LATEST_SHA=${LATEST_SHA}" >> "$GITHUB_ENV"

        if [[ -n "${CE_REPO}" ]]; then
          if [[ -n "${INPUT_CE_SHA}" ]]; then
            CE_SHA="${INPUT_CE_SHA}"
          else
            CE_SHA=$(resolve "${CE_OWNER}" "${CE_REPO}" "${BASE_BRANCH}")
          fi
          echo "CE_SHA=${CE_SHA}" >> "$GITHUB_ENV"
        fi

    - name: Ensure release does not already exist
      id: tag_check
      shell: bash
      env:
        RELEASE_TOKEN: ${{ inputs.release_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo }}
        TAG_NAME: ${{ inputs.tag_name }}
      run: |
        set -euo pipefail

        api() {
          # $1 = path under the repo; echoes "<body>\nHTTP_STATUS:<code>"
          curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/$1" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}"
        }
        # HTTP status is always the final response line ("HTTP_STATUS:<code>"),
        # so read it from the last line — a body that happens to contain the
        # token would fool a whole-response grep.
        http_status() { echo "$1" | tail -n 1 | cut -d: -f2; }

        # 1) An existing release (draft OR published) for this tag means there is
        #    nothing to do. Scan the releases list, which includes drafts — a
        #    draft creates no tag ref, so a tag-only check would miss it and a
        #    re-run would create a duplicate draft. Any non-200 is a hard failure:
        #    never fail *open* and risk a duplicate release on a transient error.
        page=1
        while :; do
          REL_RESP=$(api "releases?per_page=100&page=${page}")
          REL_STATUS=$(http_status "${REL_RESP}")
          if [[ "${REL_STATUS}" -ne 200 ]]; then
            echo "❌ Failed to list releases for ${OWNER}/${REPO} (HTTP ${REL_STATUS})" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          REL_BODY=$(echo "${REL_RESP}" | sed '$d')
          if echo "${REL_BODY}" | jq -e --arg t "${TAG_NAME}" 'any(.[]; .tag_name == $t)' >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ A release for ${TAG_NAME} already exists on ${OWNER}/${REPO}; skipping release creation" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          [[ "$(echo "${REL_BODY}" | jq 'length')" -lt 100 ]] && break
          page=$((page + 1))
        done

        # 2) No release exists. If the tag ref itself exists, a new release would
        #    attach to that tag's existing commit — so it must be the commit this
        #    run validated and generated notes for, else we would publish an
        #    unvalidated commit. Use the singular /git/ref/ endpoint for an exact
        #    match (the plural /git/refs/ form prefix-matches, so tag "v1.2" would
        #    spuriously match "v1.2.3").
        REF_RESP=$(api "git/ref/tags/${TAG_NAME}")
        REF_STATUS=$(http_status "${REF_RESP}")
        if [[ "${REF_STATUS}" -eq 404 ]]; then
          echo "exists=false" >> "$GITHUB_OUTPUT"
          exit 0
        elif [[ "${REF_STATUS}" -ne 200 ]]; then
          echo "❌ Failed to check tag ${TAG_NAME} on ${OWNER}/${REPO} (HTTP ${REF_STATUS})" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

        # Tag ref exists but has no release (a stuck state, e.g. a prior run that
        # tagged then failed before creating the release). /commits/{ref} resolves
        # an annotated tag to the commit it points at.
        TAG_RESP=$(api "commits/${TAG_NAME}")
        TAG_CSTATUS=$(http_status "${TAG_RESP}")
        if [[ "${TAG_CSTATUS}" -ne 200 ]]; then
          echo "❌ Failed to resolve tag ${TAG_NAME} on ${OWNER}/${REPO} (HTTP ${TAG_CSTATUS})" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
        TAG_SHA=$(echo "${TAG_RESP}" | sed '$d' | jq -r '.sha // ""')

        if [[ -n "${TAG_SHA}" && "${TAG_SHA}" == "${LATEST_SHA}" ]]; then
          # Tag is already at the commit we validated — recover by creating the
          # missing release rather than skipping (which would leave it stuck).
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Tag ${TAG_NAME} exists at the release commit but has no release on ${OWNER}/${REPO}; will create release." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "❌ Tag ${TAG_NAME} already exists on ${OWNER}/${REPO} at ${TAG_SHA:-<unresolved>}, but the branch head is ${LATEST_SHA}." >> "$GITHUB_STEP_SUMMARY"
          echo "A release would attach to the existing tag's commit, which this run did not validate or generate notes for. Move or delete the tag before re-running." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

    - name: Create release
      if: steps.tag_check.outputs.exists == 'false'
      shell: bash
      env:
        RELEASE_TOKEN: ${{ inputs.release_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo }}
        CE_OWNER: ${{ inputs.ce_owner }}
        CE_REPO: ${{ inputs.ce_repo }}
        TAG_NAME: ${{ inputs.tag_name }}
        RELEASE_NAME: ${{ inputs.release_name }}
        DRAFT: ${{ inputs.draft }}
        MAKE_LATEST: ${{ inputs.draft == 'false' }}
        PRERELEASE: ${{ inputs.prerelease }}
        AUTO_CHANGELOG: ${{ inputs.auto_changelog }}
        CHANGELOG: ${{ inputs.changelog }}
      run: |
        set -euo pipefail

        FINAL_BODY="${CHANGELOG}"

        # For EE bundles with a CE counterpart, build merged release notes
        if [[ -n "${CE_REPO}" ]]; then
          CE_NOTES=""
          EE_NOTES=""

          CE_GEN=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST --location \
            "https://api.github.com/repos/${CE_OWNER}/${CE_REPO}/releases/generate-notes" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}" \
            -d "$(jq -n --arg tag "${TAG_NAME}" --arg target "${CE_SHA}" '{tag_name:$tag, target_commitish:$target}')")
          CE_STATUS=$(echo "${CE_GEN}" | tail -n 1 | cut -d: -f2)
          if [[ "${CE_STATUS}" -eq 200 ]]; then
            CE_NOTES=$(echo "${CE_GEN}" | sed '$d' | jq -r '.body // ""')
          else
            echo "⚠️ generate-notes failed for CE repo ${CE_OWNER}/${CE_REPO} (HTTP ${CE_STATUS})" >> "$GITHUB_STEP_SUMMARY"
          fi

          EE_GEN=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/releases/generate-notes" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}" \
            -d "$(jq -n --arg tag "${TAG_NAME}" --arg target "${LATEST_SHA}" '{tag_name:$tag, target_commitish:$target}')")
          EE_STATUS=$(echo "${EE_GEN}" | tail -n 1 | cut -d: -f2)
          if [[ "${EE_STATUS}" -eq 200 ]]; then
            RAW_EE=$(echo "${EE_GEN}" | sed '$d' | jq -r '.body // ""')
            # Strip sync-bot PRs (incl. this workflow's pre-release sync) and the
            # auto-generated full-changelog line.
            EE_NOTES=$(echo "${RAW_EE}" | grep -Ev '@pimcore-deployments|Automated PR by|Pre-release sync CE|\*\*Full Changelog\*\*:' || true)
            EE_NOTES=$(echo "${EE_NOTES}" | sed -e '/./,$!d' -e :a -e '/^\s*$/{ $d; N; ba; }')
          else
            echo "⚠️ generate-notes failed for EE repo ${OWNER}/${REPO} (HTTP ${EE_STATUS})" >> "$GITHUB_STEP_SUMMARY"
          fi

          MERGED=""
          if [[ -n "${CE_NOTES}" ]]; then
            MERGED="${CE_NOTES}"
          fi
          if [[ -n "${EE_NOTES}" ]]; then
            [[ -n "${MERGED}" ]] && MERGED="${MERGED}"$'\n\n'
            MERGED="${MERGED}### EE-specific changes"$'\n'"${EE_NOTES}"
          fi
          if [[ -n "${CHANGELOG}" ]]; then
            [[ -n "${MERGED}" ]] && MERGED="${MERGED}"$'\n\n---\n\n'
            MERGED="${MERGED}${CHANGELOG}"
          fi
          FINAL_BODY="${MERGED}"

        elif [[ "${AUTO_CHANGELOG}" == "true" && -n "${CHANGELOG}" ]]; then
          GEN_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/releases/generate-notes" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}" \
            -d "$(jq -n --arg tag "${TAG_NAME}" --arg target "${LATEST_SHA}" '{tag_name:$tag, target_commitish:$target}')")

          GEN_STATUS=$(echo "${GEN_RESPONSE}" | tail -n 1 | cut -d: -f2)
          if [[ "${GEN_STATUS}" -eq 200 ]]; then
            GEN_NOTES=$(echo "${GEN_RESPONSE}" | sed '$d' | jq -r '.body // ""')
            FINAL_BODY="${GEN_NOTES}"$'\n\n---\n\n'"${CHANGELOG}"
          else
            echo "⚠️ generate-notes failed for ${OWNER}/${REPO} (HTTP ${GEN_STATUS}); using custom notes only" >> "$GITHUB_STEP_SUMMARY"
          fi
        fi

        MAKE_LATEST_STR="false"
        if [[ "${MAKE_LATEST}" == "true" ]]; then
          MAKE_LATEST_STR="true"
        fi

        # When a body is provided, attach it and disable auto-generated notes;
        # otherwise let the API generate notes based on AUTO_CHANGELOG.
        if [[ -n "${FINAL_BODY}" ]]; then
          GEN_NOTES_FLAG=false
          BODY_ARG=("--arg" "body" "${FINAL_BODY}")
        else
          GEN_NOTES_FLAG="${AUTO_CHANGELOG}"
          BODY_ARG=()
        fi

        REQ_BODY=$(jq -n \
          --arg target_commitish "${LATEST_SHA}" \
          --arg name "${RELEASE_NAME}" \
          --arg tag_name "${TAG_NAME}" \
          --arg make_latest "${MAKE_LATEST_STR}" \
          --argjson draft "${DRAFT}" \
          --argjson prerelease "${PRERELEASE}" \
          --argjson generate_release_notes "${GEN_NOTES_FLAG}" \
          "${BODY_ARG[@]}" \
          '{
            target_commitish: $target_commitish,
            name: $name,
            draft: $draft,
            make_latest: $make_latest,
            prerelease: $prerelease,
            tag_name: $tag_name,
            generate_release_notes: $generate_release_notes
          } + if $ARGS.named | has("body") then {body: $ARGS.named.body} else {} end')

        CREATE_RELEASE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST --location \
          "https://api.github.com/repos/${OWNER}/${REPO}/releases" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${RELEASE_TOKEN}" \
          -d "${REQ_BODY}")

        HTTP_STATUS=$(echo "${CREATE_RELEASE}" | tail -n 1 | cut -d: -f2)
        RESPONSE_BODY=$(echo "${CREATE_RELEASE}" | sed '$d')

        if [[ "${HTTP_STATUS}" -eq 201 ]]; then
          RELEASE_URL=$(echo "${RESPONSE_BODY}" | jq -r '.html_url // ""')
          if [[ "${DRAFT}" == "true" ]]; then
            echo "✅ Draft release created for ${OWNER}/${REPO}: ${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ Release published for ${OWNER}/${REPO}: ${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          fi
        elif [[ "${HTTP_STATUS}" -eq 422 ]] && echo "${RESPONSE_BODY}" | jq -e '.errors[]? | select(.code == "already_exists")' >/dev/null 2>&1; then
          # A release for this tag was created concurrently (e.g. two runs racing)
          # between the existence check above and this POST. Treat as non-fatal:
          # the release exists, but this run's notes/settings were NOT applied.
          echo "⚠️ Release for tag ${TAG_NAME} was created concurrently on ${OWNER}/${REPO}; this run's release settings and notes were NOT applied. Verify the existing release." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "❌ Failed to create release for ${OWNER}/${REPO} (HTTP ${HTTP_STATUS})" >> "$GITHUB_STEP_SUMMARY"
          echo "${RESPONSE_BODY}" | head -c 1500 >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
