name: Advisory Dry Run

# Read-only demo: given a GHSA id, print the routing decision the automation
# WOULD make. Creates nothing. Trigger manually from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      ghsa_id:
        description: "GHSA id to evaluate (e.g. GHSA-34vf-ww58-w3wc)"
        required: true
        type: string
      repo:
        description: "Advisory source repo"
        required: false
        default: "pimcore/pimcore"
        type: string

permissions:
  contents: read
  security-events: read

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          GHSA_ID: ${{ inputs.ghsa_id }}
          SRC_REPO: ${{ inputs.repo }}
        with:
          # Prefer a PAT that can read repository security advisories (incl.
          # triage state); fall back to the workflow token. If the token lacks
          # advisory read access the request 404s/403s — add an
          # ADVISORY_READ_TOKEN secret (PAT with security-advisory read) then.
          github-token: ${{ secrets.ADVISORY_READ_TOKEN != '' && secrets.ADVISORY_READ_TOKEN || github.token }}
          script: |
            const { runDryRun } = require(`${process.env.GITHUB_WORKSPACE}/scripts/security-advisory-automation/index.js`);
            // Public repo: non-published advisories are redacted in the log. Full detail is
            // available only via the local CLI.
            await runDryRun({
              github,
              repo: process.env.SRC_REPO,
              ghsaId: process.env.GHSA_ID,
              log: core.info,
              publicSafe: true,
            });
