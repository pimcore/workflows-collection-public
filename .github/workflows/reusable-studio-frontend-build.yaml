name: "Studio Frontend Build (reusable)"

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the frontend project"
        required: false
        type: string
        default: "assets/studio"
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "lts/*"
      lint:
        description: "Run lint (and optionally fix) before build"
        required: false
        type: boolean
        default: true
      typecheck:
        description: "Run type checks before build"
        required: false
        type: boolean
        default: true
      lint-script:
        description: "NPM script to run for linting"
        required: false
        type: string
        default: "lint-fix"
      typecheck-script:
        description: "NPM script to run for type checks"
        required: false
        type: string
        default: "check-types"
      build-script:
        description: "NPM script to run for production build"
        required: false
        type: string
        default: "build"
      api-client:
        description: "Regenerate the API client (before lint/typecheck/build) and commit it"
        required: false
        type: boolean
        default: false
      api-client-script:
        description: "NPM script to run for API client generation"
        required: false
        type: string
        default: "build-api-client"
      test:
        description: "Run tests after build"
        required: false
        type: boolean
        default: false
      test-script:
        description: "NPM script to run for tests"
        required: false
        type: string
        default: "test"
      commit-lint-output:
        description: "Automatically commit lint fixes"
        required: false
        type: boolean
        default: true
      commit-build-output:
        description: "Automatically commit build output"
        required: false
        type: boolean
        default: true
      build-output-path:
        description: "Path (from repo root) to built assets to commit"
        required: false
        type: string
        default: "."

# NOTE: Do NOT request `actions: write` here. The caller workflows grant only
# `contents: write`, and a reusable workflow's permissions can only be reduced,
# never elevated, relative to the caller — requesting a scope the caller lacks
# fails the whole run at startup ("workflow file issue").
#
# Caching is intentionally omitted: on untrusted triggers (pull_request_target)
# GitHub issues a read-only cache token, so cache saves are blocked and restores
# rarely match. Each job just runs `npm ci` — simple, reliable, no false-alarm
# "failed to save cache" warnings.
#
# SECURITY: jobs that execute repo-provided code (`npm ci` runs install hooks,
# `npm run …` runs repo scripts) run with `contents: read` ONLY. The
# `contents: write` token lives exclusively in the `commit-*` jobs, which never
# run project code — they only apply a captured patch and commit it. Those
# commit jobs are additionally gated to non-fork contexts, so a caller wiring
# this into `pull_request_target` can never hand a fork's code a write-capable
# token.
permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  # Read-only: regenerates the API client and captures it as a patch. No write
  # token here. On fork PRs commit-api-client is skipped, so the patch is never
  # committed and lint/typecheck/build/test validate the committed (possibly
  # stale) client; the next non-fork run regenerates and commits it.
  api-client:
    if: ${{ inputs.api-client && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.capture.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Runs repo-provided code (npm hooks + api-client script); no
          # authenticated git needed after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Regenerate API client
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.api-client-script }}

      - name: Capture API client changes as a patch
        id: capture
        run: |
          set -euo pipefail
          # Stage everything (adds, modifications AND deletions) so the patch is
          # a faithful round-trip, then diff --cached.
          git add -A
          git diff --cached --binary > "${RUNNER_TEMP}/api-client.patch"
          if [[ -s "${RUNNER_TEMP}/api-client.patch" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload API client patch
        if: ${{ steps.capture.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: api-client-patch
          path: ${{ runner.temp }}/api-client.patch
          retention-days: 1
          if-no-files-found: error
          # v4 artifact names are immutable per run; allow re-running failed
          # jobs to re-upload instead of 409-ing on the second attempt.
          overwrite: true

  # Write-capable, but runs NO repo-provided code: it only applies the API client
  # patch and commits it. Gated to non-fork contexts.
  commit-api-client:
    needs: api-client
    if: ${{ inputs.api-client && needs.api-client.outputs.has_changes == 'true' && ((github.event_name != 'pull_request' && github.event_name != 'pull_request_target') || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.repository }}

      - name: Download API client patch
        uses: actions/download-artifact@v4
        with:
          name: api-client-patch
          path: ${{ runner.temp }}

      - name: Apply API client changes
        run: git apply "${RUNNER_TEMP}/api-client.patch"

      - name: Commit API client changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          # Rebase onto the remote tip before pushing so a concurrent push to the
          # same branch doesn't fail this with a non-fast-forward rejection.
          pull: "--rebase --autostash"
          commit_message: Apply latest automatic api client updates

  # Read-only: executes repo-provided code (npm hooks + lint script). Captures
  # any lint fixes as a patch artifact; the write token is NOT present here.
  lint:
    # Ordered after commit-api-client so the checkout includes the freshly
    # committed client; api-client is also listed so a generation failure blocks
    # lint rather than letting it run against a stale client. Both default to
    # `skipped` (api-client off), leaving existing consumers unaffected.
    needs:
      - api-client
      - commit-api-client
    if: ${{ !cancelled() && inputs.lint && !startsWith(github.ref, 'refs/tags/') && (needs.api-client.result == 'success' || needs.api-client.result == 'skipped') && (needs.commit-api-client.result == 'success' || needs.commit-api-client.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.capture.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # This job runs repo-provided code (npm hooks + lint script). Keep no
          # git credentials in .git/config while that code executes; nothing
          # here needs authenticated git after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run code linting
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.lint-script }}

      - name: Capture lint fixes as a patch
        id: capture
        if: ${{ inputs.commit-lint-output }}
        run: |
          set -euo pipefail
          # Stage everything (adds, modifications AND deletions) so the patch is
          # a faithful round-trip. `-N` (intent-to-add) would only mark additions
          # and silently drop deletions from the unstaged diff, so we stage fully
          # and diff --cached instead.
          git add -A
          git diff --cached --binary > "${RUNNER_TEMP}/lint-fixes.patch"
          if [[ -s "${RUNNER_TEMP}/lint-fixes.patch" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload lint-fix patch
        if: ${{ inputs.commit-lint-output && steps.capture.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-fixes-patch
          path: ${{ runner.temp }}/lint-fixes.patch
          retention-days: 1
          if-no-files-found: error
          # v4 artifact names are immutable per run; allow re-running failed
          # jobs to re-upload instead of 409-ing on the second attempt.
          overwrite: true

  # Write-capable, but runs NO repo-provided code: it only applies the patch
  # produced above and commits it. Gated to non-fork contexts.
  commit-lint:
    needs: lint
    if: ${{ inputs.commit-lint-output && needs.lint.outputs.has_changes == 'true' && ((github.event_name != 'pull_request' && github.event_name != 'pull_request_target') || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.repository }}

      - name: Download lint-fix patch
        uses: actions/download-artifact@v4
        with:
          name: lint-fixes-patch
          path: ${{ runner.temp }}

      - name: Apply lint fixes
        run: git apply "${RUNNER_TEMP}/lint-fixes.patch"

      - name: Commit lint fixes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          # Rebase onto the remote tip before pushing so a concurrent push to the
          # same branch doesn't fail this with a non-fast-forward rejection.
          pull: "--rebase --autostash"
          commit_message: Apply eslint-fixer changes

  check-types:
    # See lint: ordered after the API client regeneration so type checks run
    # against the freshly committed client. Skipped deps => no-op when api-client
    # is off.
    needs:
      - api-client
      - commit-api-client
    if: ${{ !cancelled() && inputs.typecheck && !startsWith(github.ref, 'refs/tags/') && (needs.api-client.result == 'success' || needs.api-client.result == 'skipped') && (needs.commit-api-client.result == 'success' || needs.commit-api-client.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Runs repo-provided code (npm hooks + typecheck script); no
          # authenticated git needed after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run type checks
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.typecheck-script }}

  # Read-only: executes repo-provided code (npm hooks + build script). Captures
  # the build output as a patch artifact; the write token is NOT present here.
  # (Patch, not a directory artifact, because build-output-path defaults to the
  # whole tree.)
  build:
    # Depends on commit-lint so the checkout below already contains any pushed
    # lint fixes, matching the original sequential behaviour and avoiding a
    # concurrent push race between the two commit jobs. `lint` is ALSO listed
    # directly (and its result checked below) to preserve the lint failure gate:
    # commit-lint reports `skipped` both when lint passed with nothing to commit
    # AND when lint failed, so it can't distinguish the two — a direct check on
    # lint.result is what actually blocks the build on a lint failure.
    needs:
      - api-client
      - commit-api-client
      - lint
      - commit-lint
      - check-types
    if: ${{ !cancelled() && !startsWith(github.ref, 'refs/tags/') && (needs.api-client.result == 'success' || needs.api-client.result == 'skipped') && (needs.commit-api-client.result == 'success' || needs.commit-api-client.result == 'skipped') && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.commit-lint.result == 'success' || needs.commit-lint.result == 'skipped') && (needs.check-types.result == 'success' || needs.check-types.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.capture.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Runs repo-provided code (npm hooks + build script); no authenticated
          # git needed after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run production build
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.build-script }}

      - name: Capture build output as a patch
        id: capture
        if: ${{ inputs.commit-build-output }}
        env:
          BUILD_OUTPUT_PATH: ${{ inputs.build-output-path }}
        run: |
          set -euo pipefail
          # Stage everything (adds, modifications AND deletions) so the patch is
          # a faithful round-trip. `-N` (intent-to-add) would only mark additions
          # and silently drop deletions from the unstaged diff, so we stage fully
          # and diff --cached instead — this is what lets stale content-hashed
          # bundles get removed from the committed publish dir.
          git add -A
          git diff --cached --binary -- "${BUILD_OUTPUT_PATH}" > "${RUNNER_TEMP}/build-output.patch"
          if [[ -s "${RUNNER_TEMP}/build-output.patch" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build-output patch
        if: ${{ inputs.commit-build-output && steps.capture.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-output-patch
          path: ${{ runner.temp }}/build-output.patch
          retention-days: 1
          if-no-files-found: error
          # v4 artifact names are immutable per run; allow re-running failed
          # jobs to re-upload instead of 409-ing on the second attempt.
          overwrite: true

  # Write-capable, but runs NO repo-provided code: it only applies the build
  # patch and commits it. Gated to non-fork contexts.
  commit-build:
    needs: build
    if: ${{ inputs.commit-build-output && needs.build.outputs.has_changes == 'true' && ((github.event_name != 'pull_request' && github.event_name != 'pull_request_target') || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.repository }}

      - name: Download build-output patch
        uses: actions/download-artifact@v4
        with:
          name: build-output-patch
          path: ${{ runner.temp }}

      - name: Apply build output
        run: git apply "${RUNNER_TEMP}/build-output.patch"

      - name: Commit build output
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          file_pattern: ${{ inputs.build-output-path }}
          # Rebase onto the remote tip before pushing so a concurrent push to the
          # same branch doesn't fail this with a non-fast-forward rejection.
          pull: "--rebase --autostash"
          commit_message: Automatic frontend build

  # Read-only: runs the repo's test script after the build (and after any build
  # output has been committed). No write token here.
  # NOTE: this job checks out the branch fresh and does NOT re-run the build. If
  # the test script consumes build artifacts, enable commit-build-output so the
  # output is committed first; otherwise (or on fork PRs, where commit-build is
  # skipped) the checkout has no fresh build. studio-ui's jest runs against
  # source, so it does not depend on the build output.
  test:
    needs:
      - build
      - commit-build
    if: ${{ !cancelled() && inputs.test && !startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success' && (needs.commit-build.result == 'success' || needs.commit-build.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Runs repo-provided code (npm hooks + test script); no authenticated
          # git needed after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.test-script }}
