name: Create bugfix/hotfix release

on:
  workflow_dispatch:
    inputs:
      repository:
        required: true
        type: string
        description: "Target repository name (e.g. data-hub)"
      base_branch:
        required: true
        type: string
        description: "Maintenance branch in X.Y format (e.g. 12.3). For major/minor releases use the 'Create major/minor release' workflow"
      to_tag:
        required: true
        type: string
        description: "Release version without leading v (e.g. 12.3.1 for bugfix or 12.3.1.1 for hotfix)"
      draft:
        required: true
        default: false
        type: boolean
        description: "Create as draft release instead of publishing directly"
      skip_sync_check:
        description: "Skip the EE↔CE sync / EE-first verification gate. Only use when you are certain EE and CE are aligned"
        required: false
        default: false
        type: boolean
      autoChangelog:
        description: "Auto generated release notes"
        required: true
        default: true
        type: boolean
      changeLog:
        description: "Custom release notes (optional)"
        required: false
        type: string

env:
  REPOSITORY: ${{ inputs.repository }}
  BASE_BRANCH: ${{ inputs.base_branch }}
  TO_TAG: ${{ inputs.to_tag }}
  DRAFT: ${{ inputs.draft }}
  AUTO_CHANGELOG: ${{ inputs.autoChangelog }}
  CHANGELOG: ${{ inputs.changeLog }}

jobs:
  prepare:
    name: Prepare parameters
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    outputs:
      owner: ${{ steps.calc.outputs.owner }}
      repo: ${{ steps.calc.outputs.repo }}
      base_branch: ${{ steps.calc.outputs.base_branch }}
      latest_sha: ${{ steps.calc.outputs.latest_sha }}
      tag_name: ${{ steps.calc.outputs.tag_name }}
      release_name: ${{ steps.calc.outputs.release_name }}
      release_kind: ${{ steps.calc.outputs.release_kind }}
      prerelease: ${{ steps.calc.outputs.prerelease }}
      auto_changelog_norm: ${{ steps.calc.outputs.auto_changelog_norm }}
    steps:
      - name: Validate and calculate
        id: calc
        shell: bash
        run: |
          set -euo pipefail

          # Verify token is available
          if [[ -z "${RELEASE_TOKEN}" ]]; then
            echo "❌ RELEASE_TOKEN secret is not set or empty" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Test token validity with a simple API call
          TEST_RESP=$(curl -s -o /dev/null -w "%{http_code}" --location \
            "https://api.github.com/user" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")

          if [[ "${TEST_RESP}" -eq 401 ]]; then
            echo "❌ RELEASE_TOKEN is invalid or expired (HTTP 401)" >> "$GITHUB_STEP_SUMMARY"
            echo "Please ensure:" >> "$GITHUB_STEP_SUMMARY"
            echo "1. The token has not expired" >> "$GITHUB_STEP_SUMMARY"
            echo "2. The token has 'repo' scope for accessing repositories" >> "$GITHUB_STEP_SUMMARY"
            echo "3. The token is a classic PAT or fine-grained token with repository access" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          elif [[ "${TEST_RESP}" -ne 200 ]]; then
            echo "⚠️ Unexpected response from GitHub API when validating token (HTTP ${TEST_RESP})" >> "$GITHUB_STEP_SUMMARY"
          fi

          if ! [[ "${REPOSITORY}" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid repository name: ${REPOSITORY}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          OWNER="pimcore"
          REPO="${REPOSITORY}"
          BASE="${BASE_BRANCH#v}"
          TAG="${TO_TAG#v}"

          if [[ -z "${BASE}" || -z "${TAG}" ]]; then
            echo "base_branch and to_tag must be non-empty" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if ! [[ "${BASE}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid base_branch format. Expected X.Y (e.g. 12.3), got: ${BASE}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if ! [[ "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid to_tag format. Expected X.Y.Z or X.Y.Z.W (numeric), got: ${TAG}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Parse tag parts
          TAG_MAJOR="$(echo "${TAG}" | cut -d'.' -f1)"
          TAG_MINOR="$(echo "${TAG}" | cut -d'.' -f2)"
          TAG_PARTS_COUNT="$(echo "${TAG}" | awk -F'.' '{print NF}')"

          TAG_NAME="v${TAG}"
          RELEASE_NAME="${TAG}"

          BASE_MAJOR="$(echo "${BASE}" | cut -d'.' -f1)"
          BASE_MINOR="$(echo "${BASE}" | cut -d'.' -f2)"
          if [[ "${TAG_MAJOR}" != "${BASE_MAJOR}" || "${TAG_MINOR}" != "${BASE_MINOR}" ]]; then
            echo "Invalid tag for maintenance base. Expected ${BASE_MAJOR}.${BASE_MINOR}.* for base ${BASE}, got: ${TAG}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          RELEASE_KIND=""
          if [[ "${TAG_PARTS_COUNT}" -eq 4 ]]; then
            RELEASE_KIND="hotfix"
          elif [[ "${TAG_PARTS_COUNT}" -eq 3 ]]; then
            RELEASE_KIND="bugfix"
          else
            echo "Could not classify release kind. base_branch=${BASE} to_tag=${TAG}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          PRERELEASE=false

          SHA_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/commits/${BASE}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")

          SHA_STATUS=$(echo "${SHA_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
          if [[ "${SHA_STATUS}" -ne 200 ]]; then
            echo "Failed to fetch latest commit from ${OWNER}/${REPO}@${BASE}. HTTP ${SHA_STATUS}" >> "$GITHUB_STEP_SUMMARY"
            echo "$(echo "${SHA_RESP}" | head -c 2000)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          LATEST_SHA=$(echo "${SHA_RESP}" | sed '$d' | jq -r '.sha')
          if [[ -z "${LATEST_SHA}" || "${LATEST_SHA}" == "null" ]]; then
            echo "Failed to parse sha for ${OWNER}/${REPO}@${BASE}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "base_branch=${BASE}" >> "$GITHUB_OUTPUT"
          echo "latest_sha=${LATEST_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_kind=${RELEASE_KIND}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

          AUTO_CHANGELOG_NORM=false
          if [[ "${AUTO_CHANGELOG}" == "true" ]]; then AUTO_CHANGELOG_NORM=true; fi
          echo "auto_changelog_norm=${AUTO_CHANGELOG_NORM}" >> "$GITHUB_OUTPUT"

          {
            echo "Repository: ${OWNER}/${REPO}"
            echo "Base branch: ${BASE}"
            echo "Latest SHA: ${LATEST_SHA}"
            echo "To tag: ${TAG}"
            echo "Tag name: ${TAG_NAME}"
            echo "Release kind: ${RELEASE_KIND}"
            echo "Draft: ${DRAFT}"
            echo "Auto changelog: ${AUTO_CHANGELOG}"
            echo "Custom changelog provided: $([[ -n "${CHANGELOG}" ]] && echo yes || echo no)"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-extjs:
    name: Validate no ExtJS
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [prepare, ee-ce-sync-check]
    # Run whenever the sync gate did not fail (success or skipped); a skipped
    # gate must not cascade-skip validation.
    if: ${{ !cancelled() && needs.ee-ce-sync-check.result != 'failure' }}
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      OWNER: ${{ needs.prepare.outputs.owner }}
      REPO: ${{ needs.prepare.outputs.repo }}
      LATEST_SHA: ${{ needs.prepare.outputs.latest_sha }}
    steps:
      - name: Resolve post-sync HEAD SHA
        shell: bash
        run: |
          set -euo pipefail

          # Validate the commit that will be tagged: an EE bundle may have been
          # advanced past prepare's SHA by the CE → EE sync, so re-resolve HEAD.
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/commits/${BASE_BRANCH}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")
          STATUS=$(echo "${RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
          if [[ "${STATUS}" -ne 200 ]]; then
            echo "❌ Failed to resolve HEAD of ${OWNER}/${REPO}@${BASE_BRANCH} (HTTP ${STATUS})" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          SHA=$(echo "${RESP}" | sed '$d' | jq -r '.sha // ""')
          if [[ -z "${SHA}" || "${SHA}" == "null" ]]; then
            echo "❌ Empty SHA for ${OWNER}/${REPO}@${BASE_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "LATEST_SHA=${SHA}" >> "$GITHUB_ENV"

      - name: Check for ExtJS code
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking for ExtJS code in ${OWNER}/${REPO} at ${LATEST_SHA}..." >> "$GITHUB_STEP_SUMMARY"

          TREE_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${LATEST_SHA}?recursive=1" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")

          TREE_STATUS=$(echo "${TREE_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
          if [[ "${TREE_STATUS}" -ne 200 ]]; then
            echo "❌ Failed to fetch file tree (HTTP ${TREE_STATUS})" >> "$GITHUB_STEP_SUMMARY"
            echo "$(echo "${TREE_RESP}" | sed '$d' | head -c 1000)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          TREE=$(echo "${TREE_RESP}" | sed '$d')
          TRUNCATED=$(echo "${TREE}" | jq -r '.truncated')
          if [[ "${TRUNCATED}" == "true" ]]; then
            echo "⚠️ File tree was truncated due to repository size; ExtJS check may be incomplete." >> "$GITHUB_STEP_SUMMARY"
          fi

          # --- Pass 1: path-based check ---
          # Multi-layered detection matching comprehensive ExtJS scanner:
          # 1. Known ExtJS/Sencha dist files (ext-all.js, ext-debug.js,
          #    ext-foundation.js, ext-modern-all.js, sencha-touch-all.js, etc.)
          # 2. Sencha CMD artifacts (.sencha/ directory, sencha.cfg)
          # 3. ExtJS/Sencha directory names (extjs, ext-js, ext-6, ext-7,
          #    senchatouch, sencha-touch)
          # 4. ExtJS structural paths (/ext/src/, /ext/packages/, /ext/classic/,
          #    /ext/modern/, /ext/overrides/, /senchaextjs/, sencha-generated)
          # 5. npm/composer Sencha packages (node_modules/@sencha/, node_modules/extjs)
          PATH_HITS=$(echo "${TREE}" | jq -r '.tree[] | select(.type == "blob" or .type == "tree") | .path' | \
            grep -iE '(^|/)(\.sencha|extjs|ext-js|ext-[67]|senchatouch|sencha-touch)(/|$)|\b(ext-all(-debug|-rtl|-rtl-debug|-sandbox|-dev)?(\.min)?|ext(-debug|-foundation|-foundation-debug)?|ext-modern-all(-debug)?|sencha-touch(-all|-debug|-all-debug)?)\.js$|\bsencha\.cfg$|(^|/)node_modules/(@sencha/|extjs(/|$))|/ext/(src|packages|classic|modern|overrides)/|/(senchaextjs|sencha-generated)/' || true)

          # --- Pass 2: Sencha copyright content search ---
          # Catches actual Sencha/ExtJS library files regardless of their filename.
          # Uses the GitHub code search API (rate-limited to 10 req/min).
          # Results are filtered to code/config files only — documentation files
          # (*.md, *.txt, *.rst, etc.) that merely reference Sencha are ignored.
          SEARCH_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/search/code?q=Sencha+Inc+repo:${OWNER}/${REPO}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")

          SEARCH_STATUS=$(echo "${SEARCH_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
          CONTENT_HITS=""
          if [[ "${SEARCH_STATUS}" -eq 200 ]]; then
            TOTAL=$(echo "${SEARCH_RESP}" | sed '$d' | jq -r '.total_count')
            if [[ "${TOTAL}" -gt 0 ]]; then
              # Only flag code/config files — skip docs, readmes, license files, etc.
              CONTENT_HITS=$(echo "${SEARCH_RESP}" | sed '$d' | jq -r '.items[].path' | \
                grep -iE '\.(js|ts|mjs|jsx|tsx|css|scss|less|html|htm|xml|json|cfg|properties)$' || true)
            fi
          else
            echo "⚠️ Sencha copyright content search failed (HTTP ${SEARCH_STATUS}); relying on path-based check only." >> "$GITHUB_STEP_SUMMARY"
          fi

          # --- Aggregate results ---
          EXTJS_FILES=""
          EXTJS_SUMMARY=""
          if [[ -n "${PATH_HITS}" ]]; then
            EXTJS_FILES="yes"
            EXTJS_SUMMARY="${EXTJS_SUMMARY}**Path matches (known ExtJS filenames/directories):**\n\`\`\`\n${PATH_HITS}\n\`\`\`\n"
          fi
          if [[ -n "${CONTENT_HITS}" ]]; then
            EXTJS_FILES="yes"
            EXTJS_SUMMARY="${EXTJS_SUMMARY}**Content matches (Sencha Inc. copyright found in):**\n\`\`\`\n${CONTENT_HITS}\n\`\`\`\n"
          fi

          if [[ -n "${EXTJS_FILES}" ]]; then
            echo "❌ ExtJS/Sencha library code detected in the repository. Release is blocked." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            printf "%b" "${EXTJS_SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Remove all ExtJS/Sencha library files from branch '${BASE_BRANCH}' before releasing." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ No ExtJS/Sencha library code detected." >> "$GITHUB_STEP_SUMMARY"

  ee-ce-sync-check:
    name: EE↔CE sync gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: ${{ inputs.skip_sync_check != true }}
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
      GIT_NAME: ${{ secrets.GIT_NAME }}
      GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      OWNER: ${{ needs.prepare.outputs.owner }}
      REPO: ${{ needs.prepare.outputs.repo }}
      BASE_BRANCH: ${{ needs.prepare.outputs.base_branch }}
      TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
    steps:
      - name: Sync CE → EE (releasing an EE bundle)
        if: ${{ startsWith(needs.prepare.outputs.repo, 'ee-') }}
        shell: bash
        run: |
          set -euo pipefail

          # Releasing an EE bundle: bring EE up to date with CE first. Sync
          # direction is CE → EE (confirmed). Open a PR in EE from CE's state
          # and merge it when EE is behind. Any error fails the job (fail
          # closed) so a release is never cut against an unsynced EE.
          CE_REPO="${REPO#ee-}"

          # An EE-only bundle has no CE counterpart → nothing to sync. A missing
          # branch (404) is a legitimate skip; any other error fails closed.
          BR=$(curl -s -o /dev/null -w "%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${CE_REPO}/branches/${BASE_BRANCH}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")
          if [[ "${BR}" -eq 404 ]]; then
            echo "ℹ️ No CE counterpart ${OWNER}/${CE_REPO}@${BASE_BRANCH}; EE-only bundle, nothing to sync." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          elif [[ "${BR}" -ne 200 ]]; then
            echo "❌ Could not check CE counterpart ${OWNER}/${CE_REPO} (HTTP ${BR}); failing closed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          git clone --quiet --branch "${BASE_BRANCH}" \
            "https://x-access-token:${SYNC_TOKEN}@github.com/${OWNER}/${CE_REPO}.git" ce-src
          cd ce-src
          git config user.name "${GIT_NAME}"
          git config user.email "${GIT_EMAIL}"
          git remote add ee "https://x-access-token:${SYNC_TOKEN}@github.com/${OWNER}/${REPO}.git"
          git fetch ee "${BASE_BRANCH}:refs/remotes/ee/${BASE_BRANCH}" --quiet

          AHEAD=$(git rev-list --count "refs/remotes/ee/${BASE_BRANCH}..HEAD")
          if [[ "${AHEAD}" -eq 0 ]]; then
            echo "✅ ${OWNER}/${REPO} already in sync with ${OWNER}/${CE_REPO} on ${BASE_BRANCH}; nothing to sync." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "🔁 ${OWNER}/${CE_REPO} is ${AHEAD} commit(s) ahead of EE on ${BASE_BRANCH}; opening sync PR." >> "$GITHUB_STEP_SUMMARY"

          # Include run_attempt so a re-run of a failed release uses a fresh
          # branch and never collides with a leftover sync PR from a prior attempt.
          SYNC_BRANCH="sync-ce-to-ee-${RUN_ID}-${RUN_ATTEMPT}-${BASE_BRANCH}"
          git push ee "HEAD:refs/heads/${SYNC_BRANCH}"

          PR_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -d "$(jq -n \
                  --arg t "Pre-release sync CE → EE (${BASE_BRANCH})" \
                  --arg h "${SYNC_BRANCH}" \
                  --arg b "${BASE_BRANCH}" \
                  --arg body "Automated pre-release sync of ${OWNER}/${CE_REPO}@${BASE_BRANCH} into ${OWNER}/${REPO}@${BASE_BRANCH}." \
                  '{title:$t, head:$h, base:$b, body:$body}')")
          PR_STATUS=$(echo "${PR_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
          PR_JSON=$(echo "${PR_RESP}" | sed '$d')
          if [[ "${PR_STATUS}" -ne 201 ]]; then
            echo "❌ Failed to open sync PR in ${OWNER}/${REPO} (HTTP ${PR_STATUS})." >> "$GITHUB_STEP_SUMMARY"
            echo "$(echo "${PR_JSON}" | head -c 1000)" >> "$GITHUB_STEP_SUMMARY"
            git push ee --delete "${SYNC_BRANCH}" --quiet || true
            exit 1
          fi
          PR_NUM=$(echo "${PR_JSON}" | jq -r '.number')
          echo "Opened sync PR #${PR_NUM} in ${OWNER}/${REPO}." >> "$GITHUB_STEP_SUMMARY"

          MERGED=false
          MERGE_STATUS=""
          for attempt in 1 2 3 4 5; do
            MERGE_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PUT --location \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${PR_NUM}/merge" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${SYNC_TOKEN}" \
              -d "$(jq -n --arg m "Pre-release sync CE → EE (${BASE_BRANCH})" '{merge_method:"merge", commit_title:$m}')")
            MERGE_STATUS=$(echo "${MERGE_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
            if [[ "${MERGE_STATUS}" -eq 200 ]]; then
              MERGED=true
              break
            fi
            echo "⏳ Merge attempt ${attempt} for PR #${PR_NUM} returned HTTP ${MERGE_STATUS}; retrying..." >> "$GITHUB_STEP_SUMMARY"
            sleep 10
          done

          if [[ "${MERGED}" != "true" ]]; then
            echo "❌ Could not merge sync PR #${PR_NUM} in ${OWNER}/${REPO} (last HTTP ${MERGE_STATUS})." >> "$GITHUB_STEP_SUMMARY"
            echo "Likely a merge conflict or branch protection. Resolve/merge PR #${PR_NUM} manually, then re-run the release (or use skip_sync_check: true)." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ Merged sync PR #${PR_NUM}; ${OWNER}/${REPO}@${BASE_BRANCH} now contains CE's latest." >> "$GITHUB_STEP_SUMMARY"
          git push ee --delete "${SYNC_BRANCH}" --quiet || true

      - name: Verify EE counterpart released first (releasing a CE bundle)
        if: ${{ !startsWith(needs.prepare.outputs.repo, 'ee-') }}
        shell: bash
        run: |
          set -euo pipefail

          # Releasing a CE bundle: per "always start from EE", if an EE
          # counterpart exists it must already have a release for this version.
          # Check the releases list (which includes drafts) rather than the tag,
          # since a draft EE release does not create a tag.
          EE_REPO="ee-${REPO}"

          # Gate on EE repo existence (not a branch): if the EE counterpart repo
          # exists it must already carry a release for this version, regardless
          # of whether its maintenance branch is present. A missing repo (404)
          # is the only legitimate skip; any other status fails closed.
          RC=$(curl -s -o /dev/null -w "%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${EE_REPO}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")
          if [[ "${RC}" -eq 404 ]]; then
            echo "ℹ️ No EE counterpart repository ${OWNER}/${EE_REPO}; nothing to gate." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          elif [[ "${RC}" -ne 200 ]]; then
            echo "❌ Could not check EE counterpart ${OWNER}/${EE_REPO} (HTTP ${RC}); failing closed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          REL=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
            "https://api.github.com/repos/${OWNER}/${EE_REPO}/releases?per_page=100" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}")
          REL_STATUS=$(echo "${REL}" | awk -F: '/HTTP_STATUS:/ {print $2}')
          if [[ "${REL_STATUS}" -ne 200 ]]; then
            echo "❌ Could not list releases for ${OWNER}/${EE_REPO} (HTTP ${REL_STATUS}); failing closed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          FOUND=$(echo "${REL}" | sed '$d' | jq -r --arg t "${TAG_NAME}" 'any(.[]; .tag_name == $t)')
          if [[ "${FOUND}" != "true" ]]; then
            echo "❌ EE counterpart ${OWNER}/${EE_REPO} has no release (draft or published) for ${TAG_NAME} yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Release EE first (start from EE), then run this workflow for CE," >> "$GITHUB_STEP_SUMMARY"
            echo "or re-run with \`skip_sync_check: true\` to override." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ EE counterpart ${OWNER}/${EE_REPO} already has a release for ${TAG_NAME}." >> "$GITHUB_STEP_SUMMARY"

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [prepare, validate-milestone, validate-extjs, ee-ce-sync-check]
    # Run only when the gate, ExtJS check, and milestone validation all passed;
    # a skipped sync gate (bypass) must not cascade-skip the release.
    if: ${{ !cancelled() && needs.ee-ce-sync-check.result != 'failure' && needs.validate-extjs.result == 'success' && needs.validate-milestone.result == 'success' }}
    outputs:
      owner: ${{ needs.prepare.outputs.owner }}
      repo: ${{ needs.prepare.outputs.repo }}
      release_kind: ${{ needs.prepare.outputs.release_kind }}
      tag: ${{ needs.prepare.outputs.release_name }}
    steps:
      - name: Checkout workflow repo (for composite action)
        uses: actions/checkout@v5
      - name: Create release
        uses: ./.github/actions/create-release
        with:
          owner: ${{ needs.prepare.outputs.owner }}
          repo: ${{ needs.prepare.outputs.repo }}
          base_branch: ${{ needs.prepare.outputs.base_branch }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          release_name: ${{ needs.prepare.outputs.release_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          auto_changelog: ${{ needs.prepare.outputs.auto_changelog_norm }}
          changelog: ${{ inputs.changeLog }}
          release_token: ${{ secrets.RELEASE_TOKEN }}

  validate-milestone:
    name: Validate milestone
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
    needs: prepare
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      OWNER: ${{ needs.prepare.outputs.owner }}
      REPO: ${{ needs.prepare.outputs.repo }}
      RELEASE_KIND: ${{ needs.prepare.outputs.release_kind }}
      TAG: ${{ needs.prepare.outputs.release_name }}
    outputs:
      skip_validation: ${{ steps.validate.outputs.skip_validation }}
      milestone_number: ${{ steps.validate.outputs.milestone_number }}
    steps:
      - name: Validate milestone exists
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          KIND="${RELEASE_KIND}"

          # Skip validation for hotfix releases (they don't use milestones)
          if [[ "${KIND}" == "hotfix" ]]; then
            echo "skip_validation=true" >> "$GITHUB_OUTPUT"
            echo "Hotfix release detected; skipping milestone validation" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "skip_validation=false" >> "$GITHUB_OUTPUT"
          TITLE="${TAG}"

          # Search all milestones (open + closed) in a single pass, paginate until
          # empty with a hard cap of 10 pages (1000 milestones)
          FOUND=false
          PAGE=1
          while [[ "${PAGE}" -le 10 ]]; do
            MS_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
              "https://api.github.com/repos/${OWNER}/${REPO}/milestones?state=all&sort=created&direction=desc&per_page=100&page=${PAGE}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${RELEASE_TOKEN}")

            MS_STATUS=$(echo "${MS_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
            if [[ "${MS_STATUS}" -ne 200 ]]; then
              echo "⚠️ Failed to fetch milestones (page=${PAGE}, HTTP ${MS_STATUS})" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            RESP=$(echo "${MS_RESP}" | sed '$d')
            
            if ! echo "${RESP}" | jq -e '. | type == "array"' > /dev/null 2>&1; then
              echo "⚠️ Invalid API response (not a JSON array)" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            LEN=$(echo "${RESP}" | jq '. | length')
            if [[ "${LEN}" -eq 0 ]]; then
              break
            fi

            MS_NUMBER=$(echo "${RESP}" | jq -r --arg t "${TITLE}" '.[] | select(.title == $t) | .number' | head -n 1)
            if [[ -n "${MS_NUMBER}" && "${MS_NUMBER}" != "null" ]]; then
              echo "milestone_number=${MS_NUMBER}" >> "$GITHUB_OUTPUT"
              MS_STATE=$(echo "${RESP}" | jq -r --arg t "${TITLE}" '.[] | select(.title == $t) | .state' | head -n 1)
              echo "✅ Found milestone '${TITLE}' (#${MS_NUMBER}, state=${MS_STATE})" >> "$GITHUB_STEP_SUMMARY"
              FOUND=true
              break
            fi

            PAGE=$((PAGE+1))
          done

          if [[ "${FOUND}" == "false" ]]; then
            echo "❌ Milestone '${TITLE}' does not exist in repository ${OWNER}/${REPO}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Action required:**" >> "$GITHUB_STEP_SUMMARY"
            echo "1. Create milestone '${TITLE}' in the repository" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Re-run this workflow" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Note: The release tag may have already been created. Check the repository releases." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  milestone-automation:
    name: Milestone automation
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    needs: [create-release, validate-milestone]
    if: ${{ !cancelled() && needs.create-release.result == 'success' }}
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      OWNER: ${{ needs.create-release.outputs.owner }}
      REPO: ${{ needs.create-release.outputs.repo }}
      RELEASE_KIND: ${{ needs.create-release.outputs.release_kind }}
      TAG: ${{ needs.create-release.outputs.tag }}
      SKIP_VALIDATION: ${{ needs.validate-milestone.outputs.skip_validation }}
      VALIDATED_MS_NUMBER: ${{ needs.validate-milestone.outputs.milestone_number }}
    steps:
      - name: Decide milestone actions
        id: plan
        if: ${{ env.SKIP_VALIDATION == 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          KIND="${RELEASE_KIND}"

          IFS='.' read -r A B C D <<< "${TAG}"

          # Bugfix release - create next patch milestones and move issues
          if [[ "${KIND}" == "bugfix" ]]; then
            NEXT_PATCH="${A}.${B}.$((C+1))"
            NEXT_PATCH_2="${A}.${B}.$((C+2))"
            echo "create_titles=${NEXT_PATCH},${NEXT_PATCH_2}" >> "$GITHUB_OUTPUT"
            echo "move_from_title=${TAG}" >> "$GITHUB_OUTPUT"
            echo "move_to_title=${NEXT_PATCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip milestones for hotfix
        if: ${{ env.SKIP_VALIDATION == 'true' }}
        run: |
          echo "Hotfix release detected; no milestone automation performed." >> "$GITHUB_STEP_SUMMARY"

      - name: Use validated milestone
        id: ms_find
        if: ${{ env.SKIP_VALIDATION == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          MS_NUMBER="${VALIDATED_MS_NUMBER}"
          TITLE="${TAG}"
          
          echo "close_ms_number=${MS_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Using validated milestone '${TITLE}' (#${MS_NUMBER})" >> "$GITHUB_STEP_SUMMARY"

      - name: Create next milestones
        id: ms_create
        if: ${{ env.SKIP_VALIDATION == 'false' && steps.plan.outputs.create_titles != '' }}
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -ra TITLES <<< "${{ steps.plan.outputs.create_titles }}"
          CREATED=""

          for TITLE in "${TITLES[@]}"; do
            TITLE="$(echo "${TITLE}" | xargs)"
            [[ -z "${TITLE}" ]] && continue

            # Try to create milestone directly; handle 422 if already exists
            CREATE_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST --location \
              "https://api.github.com/repos/${OWNER}/${REPO}/milestones" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${RELEASE_TOKEN}" \
              -d "$(jq -n --arg t "${TITLE}" '{title:$t}')")

            CREATE_STATUS=$(echo "${CREATE_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
            
            if [[ "${CREATE_STATUS}" -eq 201 ]]; then
              # Successfully created
              NEW_NUM=$(echo "${CREATE_RESP}" | sed '$d' | jq -r '.number')
              echo "Created milestone '${TITLE}' (#${NEW_NUM})" >> "$GITHUB_STEP_SUMMARY"
              CREATED="${CREATED}${TITLE}:${NEW_NUM},"
            elif [[ "${CREATE_STATUS}" -eq 422 ]]; then
              # Already exists - extract number from error or fetch it
              ERROR_MSG=$(echo "${CREATE_RESP}" | sed '$d' | jq -r '.message // ""')
              if [[ "${ERROR_MSG}" == *"already exists"* ]]; then
                # Fetch the existing milestone number (single request to open milestones)
                EXISTING=$(curl -s --location \
                  "https://api.github.com/repos/${OWNER}/${REPO}/milestones?state=open&per_page=100" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${RELEASE_TOKEN}" | \
                  jq -r --arg t "${TITLE}" '.[] | select(.title == $t) | .number' | head -n 1)
                
                if [[ -n "${EXISTING}" && "${EXISTING}" != "null" ]]; then
                  echo "Milestone exists '${TITLE}' (#${EXISTING}); reusing" >> "$GITHUB_STEP_SUMMARY"
                  CREATED="${CREATED}${TITLE}:${EXISTING},"
                fi
              fi
            else
              echo "⚠️ Failed to create milestone '${TITLE}' (HTTP ${CREATE_STATUS})" >> "$GITHUB_STEP_SUMMARY"
              echo "$(echo "${CREATE_RESP}" | sed '$d' | head -c 500)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "created_map=${CREATED}" >> "$GITHUB_OUTPUT"

      - name: Move issues from current milestone to next patch
        if: ${{ env.SKIP_VALIDATION == 'false' && steps.plan.outputs.move_from_title != '' && steps.plan.outputs.move_to_title != '' }}
        shell: bash
        run: |
          set -euo pipefail
          FROM_TITLE="${{ steps.plan.outputs.move_from_title }}"
          TO_TITLE="${{ steps.plan.outputs.move_to_title }}"
          CREATED_MAP="${{ steps.ms_create.outputs.created_map }}"

          # Try to get TO_NUM from created_map first (just created in previous step)
          TO_NUM=""
          if [[ -n "${CREATED_MAP}" ]]; then
            TO_NUM=$(awk -v t="${TO_TITLE}" -F'[:,]' '{for(i=1;i<=NF;i+=2) if($i==t){print $(i+1); exit}}' <<< "${CREATED_MAP}")
          fi

          # If not in created_map, search open milestones (should be there since just created)
          if [[ -z "${TO_NUM}" ]]; then
            RESP=$(curl -s --location \
              "https://api.github.com/repos/${OWNER}/${REPO}/milestones?state=open&sort=created&direction=desc&per_page=100" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${RELEASE_TOKEN}")
            TO_NUM=$(echo "${RESP}" | jq -r --arg t "${TO_TITLE}" '.[] | select(.title == $t) | .number' | head -n 1)
          fi

          # Get FROM_NUM from validated milestone
          FROM_NUM="${{ steps.ms_find.outputs.close_ms_number }}"

          if [[ -z "${FROM_NUM}" || "${FROM_NUM}" == "null" || -z "${TO_NUM}" || "${TO_NUM}" == "null" ]]; then
            echo "⚠️ Cannot move issues: milestone numbers not found (from='${FROM_TITLE}', to='${TO_TITLE}')" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Moving issues from milestone #${FROM_NUM} (${FROM_TITLE}) to #${TO_NUM} (${TO_TITLE})" >> "$GITHUB_STEP_SUMMARY"

          PAGE=1
          MOVED=0
          TOTAL_CHECKED=0
          while true; do
            ISSUES_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --location \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues?state=open&milestone=${FROM_NUM}&per_page=100&page=${PAGE}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${RELEASE_TOKEN}")

            HTTP_STATUS=$(echo "${ISSUES_RESP}" | awk -F: '/HTTP_STATUS:/ {print $2}')
            if [[ "${HTTP_STATUS}" -ne 200 ]]; then
              echo "⚠️ Failed to fetch issues from milestone #${FROM_NUM} (HTTP ${HTTP_STATUS})" >> "$GITHUB_STEP_SUMMARY"
              echo "$(echo "${ISSUES_RESP}" | sed '$d' | head -c 500)" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            ISSUES=$(echo "${ISSUES_RESP}" | sed '$d')
            
            # Validate we got a JSON array
            if ! echo "${ISSUES}" | jq -e '. | type == "array"' > /dev/null 2>&1; then
              echo "⚠️ Invalid response from GitHub API (not a JSON array)" >> "$GITHUB_STEP_SUMMARY"
              echo "$(echo "${ISSUES}" | head -c 500)" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            LEN=$(echo "${ISSUES}" | jq '. | length')
            if [[ "${LEN}" -eq 0 ]]; then
              break
            fi

            TOTAL_CHECKED=$((TOTAL_CHECKED + LEN))
            echo "Page ${PAGE}: Found ${LEN} open items in milestone #${FROM_NUM}" >> "$GITHUB_STEP_SUMMARY"

            IDS=$(echo "${ISSUES}" | jq -r '.[].number')
            for N in ${IDS}; do
              RES=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH --location \
                "https://api.github.com/repos/${OWNER}/${REPO}/issues/${N}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${RELEASE_TOKEN}" \
                -d "$(jq -n --argjson m "${TO_NUM}" '{milestone:$m}')")
              if [[ "${RES}" -eq 200 ]]; then
                MOVED=$((MOVED+1))
              else
                echo "⚠️ Failed to move issue #${N} (HTTP ${RES})" >> "$GITHUB_STEP_SUMMARY"
              fi
            done

            PAGE=$((PAGE+1))
            if [[ "${PAGE}" -gt 50 ]]; then
              echo "⚠️ Stopped bugfix issue move after 50 pages (5000 issues checked)" >> "$GITHUB_STEP_SUMMARY"
              break
            fi
            
            # Brief pause to avoid rate limiting when processing many pages
            if [[ $((PAGE % 10)) -eq 0 ]]; then
              sleep 1
            fi
          done

          if [[ "${MOVED}" -gt 0 ]]; then
            echo "✅ Moved ${MOVED} open items from '${FROM_TITLE}' -> '${TO_TITLE}' (checked ${TOTAL_CHECKED} total)" >> "$GITHUB_STEP_SUMMARY"
          else
            if [[ "${TOTAL_CHECKED}" -eq 0 ]]; then
              echo "ℹ️ No open items found in milestone '${FROM_TITLE}' (milestone #${FROM_NUM})" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Found ${TOTAL_CHECKED} open items but moved 0 - check logs for errors" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Close current milestone (after issue moves)
        if: ${{ env.SKIP_VALIDATION == 'false' && steps.ms_find.outputs.close_ms_number != '' }}
        shell: bash
        run: |
          set -euo pipefail
          MS_NUMBER="${{ steps.ms_find.outputs.close_ms_number }}"
          curl -s --fail-with-body -X PATCH --location \
            "https://api.github.com/repos/${OWNER}/${REPO}/milestones/${MS_NUMBER}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${RELEASE_TOKEN}" \
            -d "$(jq -n '{state:"closed"}')" >/dev/null
          echo "Closed milestone #${MS_NUMBER} (after moving issues)" >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [prepare, validate-milestone, validate-extjs, ee-ce-sync-check, create-release, milestone-automation]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Release Workflow Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs.create-release.result }}" == "success" ]]; then
            echo "**Repository**: ${{ needs.create-release.outputs.owner }}/${{ needs.create-release.outputs.repo }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Tag**: v${{ needs.create-release.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Release Type**: ${{ needs.create-release.outputs.release_kind }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Repository**: ${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.repo }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Tag**: v${{ needs.prepare.outputs.release_name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Release Type**: ${{ needs.prepare.outputs.release_kind }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "**Draft**: ${{ inputs.draft }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs.ee-ce-sync-check.result }}" == "failure" ]]; then
            echo "❌ EE↔CE sync/EE-first check failed - release not created" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.ee-ce-sync-check.result }}" == "skipped" ]]; then
            echo "⏭️ EE↔CE sync check skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ EE↔CE sync check passed" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ needs.validate-extjs.result }}" == "failure" ]]; then
            echo "❌ ExtJS validation failed - release not created" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-milestone.result }}" == "failure" ]]; then
            echo "❌ Milestone validation failed - release not created" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.create-release.result }}" == "success" ]]; then
            echo "✅ Release created successfully" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.create-release.result }}" == "skipped" ]]; then
            echo "⏭️ Release creation skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Release creation failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          if [[ "${{ needs.milestone-automation.result }}" == "success" ]]; then
            echo "✅ Milestone automation completed" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.milestone-automation.result }}" == "skipped" ]]; then
            echo "⏭️ Milestone automation skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Milestone automation failed" >> "$GITHUB_STEP_SUMMARY"
          fi
