name: "Documentation Workflow (Reusable)"

on:
  workflow_call:
    inputs:
      docs_path:
        description: "Path to the docs folder"
        required: false
        type: string
        default: "doc"
      allowed_repo:
        description: "Only run for this repository (empty = any repo)"
        required: false
        type: string
        default: ""
      checkout_ref:
        description: >
          Explicit commit/branch/SHA to checkout.
          If empty, the workflow will:
          - use PR head SHA for pull_request_target
          - otherwise use github.sha
        required: false
        type: string
        default: ""
      docs_generator_ref:
        description: "Ref (branch/tag/SHA) of pimcore/workflows-collection-public providing the docs-generator tooling"
        required: false
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  docs:
    name: "Generate docs Pimcore Docs Generator"
    runs-on: ubuntu-latest
    if: ${{ inputs.allowed_repo == '' || github.repository == inputs.allowed_repo }}
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v5
        with:
          ref: >-
            ${{
              inputs.checkout_ref != '' && inputs.checkout_ref ||
              (github.event_name == 'pull_request_target'
                && github.event.pull_request.head.sha
                || github.sha)
            }}

      - name: "Checkout Docs Generator (tooling, public)"
        uses: actions/checkout@v5
        with:
          repository: "pimcore/workflows-collection-public"
          ref: ${{ inputs.docs_generator_ref }}
          path: "./_docs_tool"
          sparse-checkout: docs-generator

      - name: "Install Node"
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: "Prepare Docs"
        working-directory: "./_docs_tool/docs-generator"
        run: |
          mkdir docs
          # copy the caller repo's docs (workspace root) into the tooling working dir
          cp -r ../../${{ inputs.docs_path }} ./docs/

          # copy index page
          cp bin/resources/00_index_empty.md ./docs/00_index.md

      - name: "Build Docs"
        working-directory: "./_docs_tool/docs-generator"
        run: |
          npm install
          npm run build