name: Sync .github files to all platform repos

on:
  push:
    branches:
      - main
    paths:
      - ".github/skills/**"
      - ".github/sync-templates/**"
      - ".github/sync-config.yaml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync files to target repos
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.SYNC_TOKEN }}
          CONFIG_PATH: .github/sync-config.yaml
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
          GIT_USERNAME: ${{ secrets.GIT_NAME }}
          PR_LABELS: 'automated-sync'
          ORIGINAL_MESSAGE: true
          COMMIT_AS_PR_TITLE: true
          COMMIT_EACH_FILE: false
