name: "Studio Frontend Build Packaged (reusable)"

# Variant of reusable-studio-frontend-build.yaml that packages the compiled
# build into an archive (e.g. build-dist/build-<id>.zip) after the production
# build and commits only that archive — not the raw build output. The extractor
# shipped by studio-ui-bundle reconstructs public/studio/build/ from the
# archive at cache warmup.
#
# Diff vs reusable-studio-frontend-build.yaml:
#   - build job runs the package script (default: `npm run package-build`)
#     after the production build
#   - commit step defaults to committing `./build-dist/` instead of the
#     whole tree

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the frontend project"
        required: false
        type: string
        default: "assets/studio"
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "lts/*"
      lint:
        description: "Run lint (and optionally fix) before build"
        required: false
        type: boolean
        default: true
      typecheck:
        description: "Run type checks before build"
        required: false
        type: boolean
        default: true
      lint-script:
        description: "NPM script to run for linting"
        required: false
        type: string
        default: "lint-fix"
      typecheck-script:
        description: "NPM script to run for type checks"
        required: false
        type: string
        default: "check-types"
      build-script:
        description: "NPM script to run for production build"
        required: false
        type: string
        default: "build"
      package-script:
        description: "NPM script to package the build into an archive"
        required: false
        type: string
        default: "package-build"
      commit-lint-output:
        description: "Automatically commit lint fixes"
        required: false
        type: boolean
        default: true
      commit-build-output:
        description: "Automatically commit build archive"
        required: false
        type: boolean
        default: true
      build-output-path:
        description: "Path (from repo root) to built assets to commit"
        required: false
        type: string
        default: "./build-dist/"

# NOTE: Do NOT request `actions: write` here. The caller workflows grant only
# `contents: write`, and a reusable workflow's permissions can only be reduced,
# never elevated, relative to the caller — requesting a scope the caller lacks
# fails the whole run at startup ("workflow file issue").
#
# Caching is intentionally omitted: on untrusted triggers (pull_request_target)
# GitHub issues a read-only cache token, so cache saves are blocked and restores
# rarely match. Each job just runs `npm ci` — simple, reliable, no false-alarm
# "failed to save cache" warnings.
permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  lint:
    if: ${{ inputs.lint && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run code linting
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.lint-script }}

      - name: Commit lint fixes
        if: ${{ inputs.commit-lint-output }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          commit_message: Apply eslint-fixer changes

  check-types:
    if: ${{ inputs.typecheck && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run type checks
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.typecheck-script }}

  build:
    needs:
      - lint
      - check-types
    if: ${{ always() && !startsWith(github.ref, 'refs/tags/') && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.check-types.result == 'success' || needs.check-types.result == 'skipped') }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run production build
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.build-script }}

      - name: Package frontend build into archive
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.package-script }}

      - name: Commit build archive
        if: ${{ inputs.commit-build-output }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          file_pattern: ${{ inputs.build-output-path }}
          commit_message: Automatic frontend build
