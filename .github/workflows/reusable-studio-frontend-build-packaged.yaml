name: "Studio Frontend Build Packaged (reusable)"

# Variant of reusable-studio-frontend-build.yaml that packages the compiled
# build into an archive (e.g. build-dist/build-<id>.zip) after the production
# build and commits only that archive — not the raw build output. The extractor
# shipped by studio-ui-bundle reconstructs public/studio/build/ from the
# archive at cache warmup.
#
# Diff vs reusable-studio-frontend-build.yaml:
#   - build job runs the package script (default: `npm run package-build`)
#     after the production build
#   - commit step defaults to committing `./build-dist/` instead of the
#     whole tree

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the frontend project"
        required: false
        type: string
        default: "assets/studio"
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "lts/*"
      lint:
        description: "Run lint (and optionally fix) before build"
        required: false
        type: boolean
        default: true
      typecheck:
        description: "Run type checks before build"
        required: false
        type: boolean
        default: true
      lint-script:
        description: "NPM script to run for linting"
        required: false
        type: string
        default: "lint-fix"
      typecheck-script:
        description: "NPM script to run for type checks"
        required: false
        type: string
        default: "check-types"
      build-script:
        description: "NPM script to run for production build"
        required: false
        type: string
        default: "build"
      package-script:
        description: "NPM script to package the build into an archive"
        required: false
        type: string
        default: "package-build"
      commit-lint-output:
        description: "Automatically commit lint fixes"
        required: false
        type: boolean
        default: true
      commit-build-output:
        description: "Automatically commit build archive"
        required: false
        type: boolean
        default: true
      build-output-path:
        description: "Path (from repo root) to built assets to commit"
        required: false
        type: string
        default: "./build-dist/"

# NOTE: Do NOT request `actions: write` here. The caller workflows grant only
# `contents: write`, and a reusable workflow's permissions can only be reduced,
# never elevated, relative to the caller — requesting a scope the caller lacks
# fails the whole run at startup ("workflow file issue").
#
# Caching is intentionally omitted: on untrusted triggers (pull_request_target)
# GitHub issues a read-only cache token, so cache saves are blocked and restores
# rarely match. Each job just runs `npm ci` — simple, reliable, no false-alarm
# "failed to save cache" warnings.
#
# SECURITY: jobs that execute repo-provided code (`npm ci` runs install hooks,
# `npm run …` runs repo scripts) run with `contents: read` ONLY. The
# `contents: write` token lives exclusively in the `commit-*` jobs, which never
# run project code — they only apply an artifact/patch and commit. Those commit
# jobs are additionally gated to non-fork contexts (see IS_TRUSTED), so a
# caller wiring this into `pull_request_target` can never hand a fork's code a
# write-capable token.
permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  # Read-only: executes repo-provided code (npm hooks + lint script). Produces a
  # patch of any lint fixes as an artifact; the write token is NOT present here.
  lint:
    if: ${{ inputs.lint && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.capture.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run code linting
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.lint-script }}

      - name: Capture lint fixes as a patch
        id: capture
        if: ${{ inputs.commit-lint-output }}
        run: |
          set -euo pipefail
          # Mark untracked (non-ignored) files as intent-to-add so `git diff`
          # includes newly created files as well as modifications.
          git add -A -N
          git diff --binary > "${RUNNER_TEMP}/lint-fixes.patch"
          if [[ -s "${RUNNER_TEMP}/lint-fixes.patch" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload lint-fix patch
        if: ${{ inputs.commit-lint-output && steps.capture.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-fixes-patch
          path: ${{ runner.temp }}/lint-fixes.patch
          retention-days: 1
          if-no-files-found: error

  # Write-capable, but runs NO repo-provided code: it only applies the patch
  # produced above and commits it. Gated to non-fork contexts.
  commit-lint:
    needs: lint
    if: ${{ inputs.commit-lint-output && needs.lint.outputs.has_changes == 'true' && (github.event.pull_request.head.repo.full_name == '' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.repository }}

      - name: Download lint-fix patch
        uses: actions/download-artifact@v4
        with:
          name: lint-fixes-patch
          path: ${{ runner.temp }}

      - name: Apply lint fixes
        run: git apply "${RUNNER_TEMP}/lint-fixes.patch"

      - name: Commit lint fixes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          commit_message: Apply eslint-fixer changes

  check-types:
    if: ${{ inputs.typecheck && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run type checks
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.typecheck-script }}

  # Read-only: executes repo-provided code (npm hooks + build/package scripts).
  # Uploads the packaged archive as an artifact; the write token is NOT here.
  build:
    # Depends on commit-lint (not lint) so the checkout below already contains
    # any pushed lint fixes, matching the original sequential behaviour and
    # avoiding a concurrent push race between the two commit jobs.
    needs:
      - commit-lint
      - check-types
    if: ${{ always() && !startsWith(github.ref, 'refs/tags/') && (needs.commit-lint.result == 'success' || needs.commit-lint.result == 'skipped') && (needs.check-types.result == 'success' || needs.check-types.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run production build
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.build-script }}

      - name: Package frontend build into archive
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.package-script }}

      - name: Upload build archive
        if: ${{ inputs.commit-build-output }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-archive
          path: ${{ inputs.build-output-path }}
          retention-days: 1
          if-no-files-found: error

  # Write-capable, but runs NO repo-provided code: it only downloads the build
  # archive and commits it. Gated to non-fork contexts.
  commit-build:
    needs: build
    if: ${{ inputs.commit-build-output && (github.event.pull_request.head.repo.full_name == '' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.repository }}

      - name: Download build archive
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-archive
          path: ${{ inputs.build-output-path }}

      - name: Commit build archive
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          file_pattern: ${{ inputs.build-output-path }}
          commit_message: Automatic frontend build
