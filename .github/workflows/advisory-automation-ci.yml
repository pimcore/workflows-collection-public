name: Advisory Automation CI

# Runs the security-advisory-automation test suite (node:test) in GitHub Actions.
on:
  push:
    paths:
      - "scripts/security-advisory-automation/**"
      - ".github/workflows/advisory-automation-ci.yml"
  pull_request:
    paths:
      - "scripts/security-advisory-automation/**"
      - ".github/workflows/advisory-automation-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 20 = the runtime actions/github-script@v7 runs on (the dry-run path);
        # 22 = forward-compat headroom.
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: scripts/security-advisory-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run tests
        run: node --test
