# Maps a composer package (as named in a GHSA advisory) to its repository,
# for cases where the package name differs from the repo. The ee-* LTS
# counterpart is NOT stored here — it is derived by the ee-<name> naming
# convention and confirmed by an existence check at resolution time.
packages:
  "pimcore/pimcore":
    repo: "pimcore/pimcore"
  "pimcore/data-hub":
    repo: "pimcore/data-hub"
  "pimcore/customer-data-framework":
    repo: "pimcore/customer-data-framework"
